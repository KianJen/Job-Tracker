# Automation stack: n8n, for the email -> tracker ingestion workflow.
#
# Kept separate from backend/docker-compose.yml on purpose:
#   - it's not part of the CI/CD deploy, and
#   - it attaches to the backend stack's network so n8n can reach the API
#     (http://api:8000) by service name.
#
# Model inference runs on OpenRouter (a free cloud model), configured inside the
# n8n workflow — nothing model-related runs in this stack.
#
# Bring it up with:
#   docker compose -f automation/docker-compose.yml up -d
#
# The backend stack must already be running (it owns the backend_default network).
name: automation

services:
  n8n:
    image: n8nio/n8n:latest
    environment:
      - N8N_HOST=${HOST_IP:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://${HOST_IP:-localhost}:5678/
      # Allow login over plain HTTP on the LAN (no TLS in front of n8n here):
      - N8N_SECURE_COOKIE=false
      # One production execution at a time: keeps overlapping polls from firing
      # concurrent OpenRouter requests (rate limits) and preserves dedup ordering.
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=1
      - GENERIC_TIMEZONE=${TZ:-UTC}
      - TZ=${TZ:-UTC}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - backend_default
    restart: unless-stopped

volumes:
  n8n_data:

networks:
  backend_default:
    external: true
