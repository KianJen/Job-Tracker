name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# If you push again while a run is in progress, cancel the older one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      # `npm run build` is `tsc -b && vite build`, so this type-checks too.
      - run: npm run build

  backend:
    name: Backend deps & syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Compile-check the app
        working-directory: backend
        run: python -m compileall app

  deploy:
    name: Deploy to home server
    needs: [frontend, backend]
    # Only deploy on a push to main — never on pull requests.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, job-tracker]
    steps:
      - uses: actions/checkout@v4

      - name: Write backend/.env from secrets
        run: |
          cat > backend/.env <<'EOF'
          S3_ACCESS_KEY_ID=${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY }}
          DATABASE_URL=postgresql+asyncpg://jobtracker:jobtracker@localhost:5432/jobtracker
          S3_ENDPOINT_URL=http://localhost:3900
          S3_BUCKET=job-tracker-docs
          S3_REGION=garage
          PUBLIC_BASE_URL=http://${{ vars.HOST_IP }}
          CORS_ORIGINS=["http://${{ vars.HOST_IP }}"]
          HOST_IP=${{ vars.HOST_IP }}
          EOF

      - name: Build & (re)start the stack
        run: docker compose -f backend/docker-compose.yml up -d --build --remove-orphans

      - name: Clean up dangling images
        run: docker image prune -f
